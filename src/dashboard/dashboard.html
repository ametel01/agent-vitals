<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Vitals Dashboard</title>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Recharts UMD expects PropTypes as a global dependency -->
  <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>

  <!-- Recharts -->
  <script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

  <!-- Babel standalone for JSX -->
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --card: #1a1a2e;
      --card-border: #2a2a4a;
      --text: #e0e0e0;
      --text-dim: #888;
      --accent: #00d4ff;
      --green: #00ff88;
      --red: #ff4444;
      --yellow: #ffcc00;
      --grid-color: #333;
      --tooltip-bg: #1a1a2e;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* Top bar */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      background: linear-gradient(180deg, #16162a 0%, #0f0f0f 100%);
      border-bottom: 1px solid var(--card-border);
    }

    .topbar-title {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--accent);
    }

    .health-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .health-badge.green  { background: rgba(0,255,136,0.15); color: var(--green); border: 1px solid rgba(0,255,136,0.3); }
    .health-badge.yellow { background: rgba(255,204,0,0.15); color: var(--yellow); border: 1px solid rgba(255,204,0,0.3); }
    .health-badge.red    { background: rgba(255,68,68,0.15);  color: var(--red);    border: 1px solid rgba(255,68,68,0.3); }

    .topbar-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .source-select {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      padding: 4px 10px;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
    }

    .source-select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .health-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    .health-dot.green  { background: var(--green); }
    .health-dot.yellow { background: var(--yellow); }
    .health-dot.red    { background: var(--red); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Summary stats */
    .summary-row {
      display: flex;
      gap: 16px;
      padding: 16px 24px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 12px 20px;
      flex: 1;
      min-width: 160px;
    }

    .stat-card.interactive {
      cursor: pointer;
      position: relative;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .stat-card.interactive:hover,
    .stat-card.interactive.active {
      border-color: rgba(0,212,255,0.45);
      box-shadow: 0 0 0 1px rgba(0,212,255,0.08);
    }

    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-hint {
      color: var(--text-dim);
      font-size: 10px;
      margin-top: 4px;
    }

    .date-picker-popover {
      position: absolute;
      top: calc(100% + 10px);
      left: 0;
      z-index: 200;
      width: min(620px, calc(100vw - 48px));
      background: #151529;
      border: 1px solid rgba(0,212,255,0.35);
      border-radius: 8px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.45);
      padding: 14px;
      cursor: default;
    }

    .date-picker-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .date-picker-title {
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .date-picker-nav,
    .date-picker-button {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      padding: 6px 10px;
    }

    .date-picker-nav:hover,
    .date-picker-button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .date-picker-button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #0f0f0f;
      font-weight: 700;
    }

    .date-picker-button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .date-picker-inputs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .date-picker-inputs label {
      color: var(--text-dim);
      display: flex;
      flex-direction: column;
      font-size: 10px;
      gap: 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .date-picker-inputs input {
      background: var(--bg);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      padding: 7px 8px;
    }

    .date-picker-inputs input:focus {
      border-color: var(--accent);
      outline: none;
    }

    .calendar-grid-wrap {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .calendar-month-title {
      color: var(--text);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 8px;
      text-align: center;
      text-transform: uppercase;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }

    .calendar-weekday {
      color: var(--text-dim);
      font-size: 9px;
      text-align: center;
      text-transform: uppercase;
    }

    .calendar-day {
      align-items: center;
      aspect-ratio: 1;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      display: flex;
      font-family: inherit;
      font-size: 11px;
      justify-content: center;
      min-width: 0;
    }

    .calendar-day:hover {
      border-color: rgba(0,212,255,0.45);
      color: var(--accent);
    }

    .calendar-day.in-range {
      background: rgba(0,212,255,0.12);
    }

    .calendar-day.selected {
      background: var(--accent);
      color: #0f0f0f;
      font-weight: 700;
    }

    .calendar-day.disabled {
      color: rgba(136,136,136,0.35);
      cursor: not-allowed;
    }

    .date-picker-actions {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 12px;
    }

    .date-picker-action-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    @media (max-width: 700px) {
      .date-picker-popover {
        left: 50%;
        transform: translateX(-50%);
      }

      .calendar-grid-wrap,
      .date-picker-inputs {
        grid-template-columns: 1fr;
      }
    }

    .prescription-summary {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      padding: 0 24px 16px;
    }

    .prescription-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 12px 16px;
    }

    .prescription-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }

    .prescription-provider {
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .prescription-change-id {
      color: var(--text-dim);
      font-size: 10px;
    }

    .prescription-time {
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .prescription-detail {
      color: var(--text-dim);
      font-size: 11px;
      line-height: 1.5;
    }

    .prescription-detail strong {
      color: var(--text);
    }

    @media (max-width: 900px) {
      .prescription-summary {
        grid-template-columns: 1fr;
      }
    }

    /* Change timeline */
    .timeline-container {
      padding: 8px 24px 16px;
    }

    .timeline-header {
      align-items: baseline;
      display: flex;
      gap: 10px;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .timeline-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-dim);
    }

    .timeline-hint {
      color: var(--text-dim);
      font-size: 10px;
    }

    .timeline-bar {
      position: relative;
      height: 40px;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      overflow: visible;
    }

    .timeline-track {
      position: absolute;
      top: 50%;
      left: 16px;
      right: 16px;
      height: 2px;
      background: var(--card-border);
      transform: translateY(-50%);
    }

    .timeline-marker {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      min-width: 24px;
      height: 22px;
      border-radius: 999px;
      background: var(--accent);
      border: 2px solid var(--card);
      color: #0f0f0f;
      cursor: pointer;
      font-family: inherit;
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
      padding: 0 6px;
      transition: all 0.2s;
      z-index: 2;
    }

    .timeline-marker:hover {
      transform: translate(-50%, -50%) scale(1.5);
      background: #fff;
      box-shadow: 0 0 12px var(--accent);
    }

    .timeline-marker.active {
      background: #fff;
      box-shadow: 0 0 12px var(--accent);
      transform: translate(-50%, -50%) scale(1.4);
    }

    .timeline-tooltip {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: var(--tooltip-bg);
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 11px;
      min-width: 220px;
      pointer-events: none;
      z-index: 10;
      margin-bottom: 8px;
    }

    .timeline-tooltip::after {
      content: '';
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      border: 5px solid transparent;
      border-top-color: var(--accent);
    }

    .timeline-selection {
      background: rgba(26,26,46,0.6);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      margin-top: 10px;
      padding: 10px 12px;
    }

    .timeline-selection-title {
      color: var(--text);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .timeline-event-list {
      display: grid;
      gap: 6px;
    }

    .timeline-event {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      padding: 8px 10px;
      text-align: left;
    }

    .timeline-event:hover,
    .timeline-event.active {
      border-color: rgba(0,212,255,0.45);
      color: var(--accent);
    }

    .timeline-event-meta {
      color: var(--text-dim);
      display: block;
      font-size: 10px;
      margin-top: 2px;
    }

    .alerts-popover {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      z-index: 200;
      width: min(560px, calc(100vw - 48px));
      background: #151529;
      border: 1px solid rgba(255,204,0,0.35);
      border-radius: 8px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.45);
      padding: 14px;
      cursor: default;
    }

    .alerts-popover-title {
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .alert-detail {
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 10px 12px;
    }

    .alert-detail + .alert-detail {
      margin-top: 8px;
    }

    .alert-detail.critical {
      border-color: rgba(255,68,68,0.35);
      background: rgba(255,68,68,0.08);
    }

    .alert-detail.warning {
      border-color: rgba(255,204,0,0.35);
      background: rgba(255,204,0,0.08);
    }

    .alert-detail-header {
      align-items: center;
      display: flex;
      gap: 8px;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .alert-detail-title {
      color: #fff;
      font-size: 12px;
      font-weight: 700;
    }

    .alert-detail-severity {
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 2px 6px;
      text-transform: uppercase;
    }

    .alert-detail-severity.critical {
      background: rgba(255,68,68,0.16);
      color: var(--red);
    }

    .alert-detail-severity.warning {
      background: rgba(255,204,0,0.16);
      color: var(--yellow);
    }

    .alert-detail-body {
      color: var(--text-dim);
      font-size: 11px;
      line-height: 1.5;
    }

    .alert-detail-body strong {
      color: var(--text);
    }

    /* Section headings */
    .section-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--text-dim);
      padding: 20px 24px 8px;
      text-transform: uppercase;
    }

    /* Chart grid */
    .chart-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      padding: 0 24px 24px;
    }

    @media (max-width: 900px) {
      .chart-grid { grid-template-columns: 1fr; }
    }

    /* Chart card */
    .chart-card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 16px;
      transition: border-color 0.3s;
    }

    .chart-card:hover {
      border-color: rgba(0,212,255,0.3);
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 8px;
      gap: 12px;
    }

    .chart-title-row {
      align-items: center;
      display: flex;
      gap: 6px;
      min-width: 0;
    }

    .chart-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
    }

    .metric-help {
      align-items: center;
      background: transparent;
      border: 1px solid var(--card-border);
      border-radius: 999px;
      color: var(--text-dim);
      cursor: help;
      display: inline-flex;
      flex: 0 0 auto;
      font-family: inherit;
      font-size: 10px;
      font-weight: 700;
      height: 18px;
      justify-content: center;
      line-height: 1;
      position: relative;
      width: 18px;
    }

    .metric-help:hover,
    .metric-help:focus {
      border-color: var(--accent);
      color: var(--accent);
      outline: none;
    }

    .metric-help-tooltip {
      background: var(--tooltip-bg);
      border: 1px solid var(--accent);
      border-radius: 6px;
      bottom: calc(100% + 8px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
      color: var(--text);
      display: none;
      font-size: 11px;
      font-weight: 400;
      left: 50%;
      letter-spacing: 0;
      line-height: 1.45;
      max-width: min(320px, calc(100vw - 64px));
      padding: 8px 10px;
      position: absolute;
      text-align: left;
      text-transform: none;
      transform: translateX(-50%);
      width: max-content;
      z-index: 220;
    }

    .metric-help-tooltip::after {
      border: 5px solid transparent;
      border-top-color: var(--accent);
      content: '';
      left: 50%;
      position: absolute;
      top: 100%;
      transform: translateX(-50%);
    }

    .metric-help:hover .metric-help-tooltip,
    .metric-help:focus .metric-help-tooltip {
      display: block;
    }

    .chart-value {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
    }

    /* Custom recharts tooltip */
    .custom-tooltip {
      background: var(--tooltip-bg) !important;
      border: 1px solid var(--card-border) !important;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 11px;
    }

    .custom-tooltip .label {
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    .custom-tooltip .value {
      color: var(--accent);
      font-weight: 600;
    }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      gap: 16px;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--card-border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading">
      <div class="loading-spinner"></div>
      <div style="color: var(--text-dim)">Loading dashboard...</div>
      <noscript>
        <div style="color: var(--red); margin-top: 8px">
          JavaScript is required to render the dashboard.
        </div>
      </noscript>
    </div>
  </div>

  <script type="text/babel">
    function renderBootError(message) {
      const rootEl = document.getElementById('root');
      if (!rootEl) return;
      rootEl.innerHTML = `
        <div class="loading">
          <div style="color: var(--red); font-size: 16px">Dashboard failed to load</div>
          <div style="color: var(--text-dim); margin-top: 8px">${message}</div>
        </div>
      `;
    }

    const missingDependencies = ['React', 'ReactDOM', 'PropTypes', 'Recharts']
      .filter(name => !window[name]);

    if (missingDependencies.length > 0) {
      const message = `Missing browser dependency: ${missingDependencies.join(', ')}`;
      renderBootError(message);
      throw new Error(message);
    }

    const {
      LineChart, Line, AreaChart, Area, BarChart, Bar,
      XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer,
      ReferenceLine, Legend
    } = Recharts;

    const DEFAULT_SOURCE = '__AGENT_VITALS_DEFAULT_SOURCE__';

    // -----------------------------------------------------------------------
    // Constants
    // -----------------------------------------------------------------------

    const COLORS = {
      primary: '#00d4ff',
      green: '#00ff88',
      red: '#ff4444',
      yellow: '#ffcc00',
      grid: '#333',
      tooltipBg: '#1a1a2e',
      dimText: '#888',
    };

    const METRIC_SECTIONS = [
      {
        title: 'THINKING',
        metrics: [
          {
            key: 'thinking_depth_median',
            label: 'Thinking Depth (median)',
            format: 'depth',
            description: 'Median estimated thinking characters. This is the upstream quality indicator: shallow thinking tends to precede fewer reads, more blind edits, and more laziness signals.',
            refs: [{ val: 2200, label: 'Good', color: COLORS.green }, { val: 600, label: 'Degraded', color: COLORS.red }],
          },
          {
            key: 'thinking_depth_redacted_pct',
            label: 'Redacted Thinking %',
            format: 'pct',
            chartType: 'area',
            description: 'Percentage of thinking blocks with no visible content, only a signature. High redaction hides quality changes from users.',
          },
        ],
      },
      {
        title: 'BEHAVIOR',
        metrics: [
          {
            key: 'read_edit_ratio',
            label: 'Read : Edit Ratio',
            format: 'ratio',
            description: 'Files read divided by files edited. A high value means the agent is researching before acting; a low value suggests guessing.',
            refs: [{ val: 6.6, label: 'Good', color: COLORS.green }, { val: 2.0, label: 'Degraded', color: COLORS.red }],
          },
          {
            key: 'blind_edit_rate',
            label: 'Blind Edit Rate',
            format: 'pct',
            description: 'Percentage of edits where the target file was not read in the preceding 10 tool calls. Blind edits correlate with broken builds and user corrections.',
            refs: [{ val: 6.2, label: 'Good', color: COLORS.green }, { val: 33.7, label: 'Degraded', color: COLORS.red }],
          },
          {
            key: 'first_tool_read_pct',
            label: 'First Tool = Read %',
            format: 'pct',
            chartType: 'bar',

    // -----------------------------------------------------------------------
    // Formatters
    // -----------------------------------------------------------------------

    function formatMetricValue(value, format) {
      if (value == null || isNaN(value)) return '--';
      switch (format) {
        case 'ratio': return value.toFixed(1);
        case 'count': return Math.round(value).toString();
        case 'pct': return value.toFixed(1) + '%';
        case 'currency': return '$' + value.toFixed(2);
        case 'depth': return Math.round(value).toLocaleString();
        default: return value.toFixed(2);
      }
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function formatDateTime(timestamp) {
      if (!timestamp) return 'Never';
      const date = new Date(timestamp);
      if (Number.isNaN(date.getTime())) return timestamp;
      return date.toLocaleString('en-US', {
        month: 'short',
        day: 'numeric',
        hour: 'numeric',
        minute: '2-digit',
      });
    }

    function toIsoDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function parseIsoDate(dateStr) {
      if (!dateStr) return null;
      const [year, month, day] = dateStr.split('-').map(Number);
      if (!year || !month || !day) return null;
      return new Date(year, month - 1, day);
    }

    function addDays(dateStr, days) {
      const date = parseIsoDate(dateStr);
      if (!date) return '';
      date.setDate(date.getDate() + days);
      return toIsoDate(date);
    }

    function addMonths(date, months) {
      return new Date(date.getFullYear(), date.getMonth() + months, 1);
    }

    function monthLabel(date) {
      return date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
    }

    function metricLabel(metric) {
      return String(metric || '')
        .split('_')
        .filter(Boolean)
        .map(part => part.charAt(0).toUpperCase() + part.slice(1))
        .join(' ');
    }

    function clampDate(dateStr, availableRange) {
      if (!dateStr) return '';
      if (availableRange && availableRange.min && dateStr < availableRange.min) return availableRange.min;
      if (availableRange && availableRange.max && dateStr > availableRange.max) return availableRange.max;
      return dateStr;
    }

    function normalizeRange(start, end) {
      if (start && end && start > end) return { start: end, end: start };
      return { start, end };
    }

    function buildCalendarDays(monthDate) {
      const first = new Date(monthDate.getFullYear(), monthDate.getMonth(), 1);
      const daysInMonth = new Date(monthDate.getFullYear(), monthDate.getMonth() + 1, 0).getDate();
      const days = [];

      for (let i = 0; i < first.getDay(); i++) days.push(null);
      for (let day = 1; day <= daysInMonth; day++) {
        days.push(new Date(monthDate.getFullYear(), monthDate.getMonth(), day));
      }
      while (days.length % 7 !== 0) days.push(null);

      return days;
    }

    // -----------------------------------------------------------------------
    // Custom Tooltip
    // -----------------------------------------------------------------------

    function CustomTooltip({ active, payload, label, format }) {
      if (!active || !payload || !payload.length) return null;
      return (
        <div className="custom-tooltip">
          <div className="label">{formatDate(label)}</div>
          {payload.map((p, i) => (
            <div key={i} className="value" style={{ color: p.color || COLORS.primary }}>
              {formatMetricValue(p.value, format)}
            </div>
          ))}
        </div>
      );
    }

    // -----------------------------------------------------------------------
    // MetricChart
    // -----------------------------------------------------------------------

    function MetricChart({ metricDef, data, activeChangeDate }) {
      const { key, label, format, refs, chartType, description } = metricDef;

      const chartData = data
        .filter(d => d.metric_name === key)
        .map(d => ({ date: d.date, value: d.value }));

      const latestValue = chartData.length > 0
        ? chartData[chartData.length - 1].value
        : null;

      const commonProps = {
        data: chartData,
        margin: { top: 8, right: 12, left: 0, bottom: 4 },
      };

      const xAxisProps = {
        dataKey: 'date',
        tick: { fontSize: 9, fill: COLORS.dimText },
        tickFormatter: formatDate,
        stroke: COLORS.grid,
        tickLine: false,
        minTickGap: 40,
      };

      const yAxisProps = {
        tick: { fontSize: 9, fill: COLORS.dimText },
        stroke: COLORS.grid,
        tickLine: false,
        axisLine: false,
        width: 45,
      };

      const gridProps = {
        strokeDasharray: '3 3',
        stroke: 'rgba(51,51,51,0.5)',
        vertical: false,
      };

      const tooltipProps = {
        content: <CustomTooltip format={format} />,
        cursor: { stroke: 'rgba(0,212,255,0.2)', strokeWidth: 1 },
      };

      const referenceLines = (refs || []).map((r, i) => (
        <ReferenceLine
          key={`ref-${i}`}
          y={r.val}
          stroke={r.color}
          strokeDasharray="6 3"
          strokeOpacity={0.5}
          label={{
            value: r.label + ' ' + r.val,
            position: 'right',
            fill: r.color,
            fontSize: 9,
            opacity: 0.7,
          }}
        />
      ));

      const changeOverlay = activeChangeDate ? (
        <ReferenceLine
          x={activeChangeDate}
          stroke={COLORS.yellow}
          strokeDasharray="4 4"
          strokeWidth={2}
          label={{
            value: '',
            position: 'top',
          }}
        />
      ) : null;

      let chart;

      if (chartType === 'area') {
        chart = (
          <AreaChart {...commonProps}>
            <CartesianGrid {...gridProps} />
            <XAxis {...xAxisProps} />
            <YAxis {...yAxisProps} />
            <Tooltip {...tooltipProps} />
            {referenceLines}
            {changeOverlay}
            <defs>
              <linearGradient id={`grad-${key}`} x1="0" y1="0" x2="0" y2="1">
                <stop offset="5%" stopColor={COLORS.primary} stopOpacity={0.3} />
                <stop offset="95%" stopColor={COLORS.primary} stopOpacity={0} />
              </linearGradient>
            </defs>
            <Area
              type="monotone"
              dataKey="value"
              stroke={COLORS.primary}
              strokeWidth={2}
              fill={`url(#grad-${key})`}
              dot={false}
              activeDot={{ r: 4, fill: COLORS.primary }}
            />
          </AreaChart>
        );
      } else if (chartType === 'bar') {
        chart = (
          <BarChart {...commonProps}>
            <CartesianGrid {...gridProps} />
            <XAxis {...xAxisProps} />
            <YAxis {...yAxisProps} />
            <Tooltip {...tooltipProps} />
            {referenceLines}
            {changeOverlay}
            <Bar
              dataKey="value"
              fill={COLORS.primary}
              radius={[2, 2, 0, 0]}
              maxBarSize={12}
            />
          </BarChart>
        );
      } else {
        chart = (
          <LineChart {...commonProps}>
            <CartesianGrid {...gridProps} />
            <XAxis {...xAxisProps} />
            <YAxis {...yAxisProps} />
            <Tooltip {...tooltipProps} />
            {referenceLines}
            {changeOverlay}
            <Line
              type="monotone"
              dataKey="value"
              stroke={COLORS.primary}
              strokeWidth={2}
              dot={false}
              activeDot={{ r: 4, fill: COLORS.primary, stroke: '#fff', strokeWidth: 1 }}
            />
          </LineChart>
        );
      }

      return (
        <div className="chart-card">
          <div className="chart-header">
            <span className="chart-title-row">
              <span className="chart-title">{label}</span>
              {description && (
                <button
                  type="button"
                  className="metric-help"
                  aria-label={`${label} description`}
                >
                  ?
                  <span className="metric-help-tooltip">{description}</span>
                </button>
              )}
            </span>
            <span className="chart-value">{formatMetricValue(latestValue, format)}</span>
          </div>
          <ResponsiveContainer width="100%" height={180}>
            {chart}
          </ResponsiveContainer>
        </div>
      );
    }

    // -----------------------------------------------------------------------
    // ChangeTimeline
    // -----------------------------------------------------------------------

    function ChangeTimeline({ changes, metricsData, activeChangeId, onSelectChange }) {
      const [hoveredDate, setHoveredDate] = React.useState(null);

      if (!changes || changes.length === 0 || !metricsData || metricsData.length === 0) {
        return null;
      }

      // Get date range from metrics data
      const dates = Array.from(new Set(metricsData.map(d => d.date))).sort();
      const minDate = dates[0];
      const maxDate = dates[dates.length - 1];
      const minTime = new Date(minDate + 'T00:00:00').getTime();
      const maxTime = new Date(maxDate + 'T00:00:00').getTime();
      const range = maxTime - minTime || 1;
      const changesInRange = changes.filter(change => {
        const changeDate = change.timestamp.substring(0, 10);
        return changeDate >= minDate && changeDate <= maxDate;
      });
      const groupsByDate = new Map();
      for (const change of changesInRange) {
        const changeDate = change.timestamp.substring(0, 10);
        if (!groupsByDate.has(changeDate)) groupsByDate.set(changeDate, []);
        groupsByDate.get(changeDate).push(change);
      }
      const groups = Array.from(groupsByDate.entries())
        .map(([date, items]) => ({
          date,
          items: items.slice().sort((a, b) => b.timestamp.localeCompare(a.timestamp)),
        }))
        .sort((a, b) => a.date.localeCompare(b.date));
      const activeChange = changes.find(change => change.id === activeChangeId) || null;
      const activeDate = activeChange ? activeChange.timestamp.substring(0, 10) : null;
      const selectedGroup = activeDate ? groups.find(group => group.date === activeDate) : null;

      if (groups.length === 0) {
        return (
          <div className="timeline-container">
            <div className="timeline-header">
              <div className="timeline-label">Change Timeline</div>
              <div className="timeline-hint">No tracked changes in this date range.</div>
            </div>
          </div>
        );
      }

      return (
        <div className="timeline-container">
          <div className="timeline-header">
            <div className="timeline-label">Change Timeline</div>
            <div className="timeline-hint">
              Click a marker to overlay that change date on every chart.
            </div>
          </div>
          <div className="timeline-bar">
            <div className="timeline-track" />
            {groups.map(group => {
              const changeTime = new Date(group.date + 'T00:00:00').getTime();
              const pct = ((changeTime - minTime) / range) * 100;
              const clampedPct = Math.max(1, Math.min(99, pct));
              const isActive = activeDate === group.date;
              const isHovered = hoveredDate === group.date;
              const defaultChange = group.items[0];

              return (
                <div key={group.date} style={{ position: 'absolute', left: `${clampedPct}%`, top: 0, bottom: 0 }}>
                  <button
                    type="button"
                    className={`timeline-marker ${isActive ? 'active' : ''}`}
                    style={{ position: 'absolute', top: '50%', left: '50%', transform: `translate(-50%, -50%)${isActive ? ' scale(1.4)' : ''}` }}
                    onClick={() => onSelectChange(isActive ? null : defaultChange)}
                    onMouseEnter={() => setHoveredDate(group.date)}
                    onMouseLeave={() => setHoveredDate(null)}
                    aria-label={`${group.items.length} change${group.items.length === 1 ? '' : 's'} on ${group.date}`}
                  >
                    {group.items.length}
                  </button>
                  {(isHovered || isActive) && (
                    <div className="timeline-tooltip" style={{ position: 'absolute', bottom: '100%', left: '50%', transform: 'translateX(-50%)', marginBottom: '24px' }}>
                      <div style={{ color: COLORS.primary, fontWeight: 600 }}>
                        {formatDate(group.date)} · {group.items.length} change{group.items.length === 1 ? '' : 's'}
                      </div>
                      <div style={{ color: '#e0e0e0', maxWidth: 280, whiteSpace: 'normal', marginTop: 2 }}>
                        Click to inspect and overlay this date.
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          {selectedGroup && (
            <div className="timeline-selection">
              <div className="timeline-selection-title">
                {formatDate(selectedGroup.date)} changes
              </div>
              <div className="timeline-event-list">
                {selectedGroup.items.map(change => (
                  <button
                    type="button"
                    className={`timeline-event ${activeChangeId === change.id ? 'active' : ''}`}
                    key={change.id}
                    onClick={() => onSelectChange(change)}
                  >
                    [{change.type}] {change.description}
                    <span className="timeline-event-meta">
                      change #{change.id} · {change.provider || 'all'} · {formatDateTime(change.timestamp)}
                      {change.impacts && change.impacts.length > 0
                        ? ` · ${change.impacts.filter(i => i.verdict === 'improved').length} improved / ${change.impacts.filter(i => i.verdict === 'degraded').length} degraded`
                        : ''}
                    </span>
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // -----------------------------------------------------------------------
    // DateRangePicker
    // -----------------------------------------------------------------------

    function CalendarMonth({ monthDate, draftStart, draftEnd, availableRange, onSelectDate }) {
      const weekdays = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
      const days = buildCalendarDays(monthDate);

      return (
        <div>
          <div className="calendar-month-title">{monthLabel(monthDate)}</div>
          <div className="calendar-grid">
            {weekdays.map((day, index) => (
              <div key={`${day}-${index}`} className="calendar-weekday">{day}</div>
            ))}
            {days.map((date, index) => {
              if (!date) return <div key={`empty-${index}`} />;
              const iso = toIsoDate(date);
              const disabled =
                (availableRange && availableRange.min && iso < availableRange.min) ||
                (availableRange && availableRange.max && iso > availableRange.max);
              const selected = iso === draftStart || iso === draftEnd;
              const inRange = draftStart && draftEnd && iso > draftStart && iso < draftEnd;

              return (
                <button
                  key={iso}
                  type="button"
                  className={`calendar-day ${selected ? 'selected' : ''} ${inRange ? 'in-range' : ''} ${disabled ? 'disabled' : ''}`}
                  disabled={disabled}
                  onClick={() => onSelectDate(iso)}
                >
                  {date.getDate()}
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    function DateRangePicker({ dateRange, availableRange, onApply, onClear, onClose }) {
      const initialStart = dateRange.start || (availableRange && availableRange.min) || '';
      const initialEnd = dateRange.end || (availableRange && availableRange.max) || '';
      const initialMonth = parseIsoDate(initialStart || initialEnd) || new Date();
      const [draftStart, setDraftStart] = React.useState(initialStart);
      const [draftEnd, setDraftEnd] = React.useState(initialEnd);
      const [visibleMonth, setVisibleMonth] = React.useState(
        new Date(initialMonth.getFullYear(), initialMonth.getMonth(), 1),
      );

      function selectDate(date) {
        if (!draftStart || (draftStart && draftEnd)) {
          setDraftStart(date);
          setDraftEnd('');
          return;
        }

        const next = normalizeRange(draftStart, date);
        setDraftStart(next.start);
        setDraftEnd(next.end);
      }

      function setPreset(days) {
        const end = (availableRange && availableRange.max) || toIsoDate(new Date());
        const start = clampDate(addDays(end, -(days - 1)), availableRange);
        setDraftStart(start);
        setDraftEnd(end);
        const parsed = parseIsoDate(start);
        if (parsed) setVisibleMonth(new Date(parsed.getFullYear(), parsed.getMonth(), 1));
      }

      function applyRange() {
        const next = normalizeRange(
          clampDate(draftStart, availableRange),
          clampDate(draftEnd, availableRange),
        );
        onApply(next);
      }

      return (
        <div className="date-picker-popover" onClick={(event) => event.stopPropagation()}>
          <div className="date-picker-header">
            <button
              className="date-picker-nav"
              type="button"
              onClick={() => setVisibleMonth(addMonths(visibleMonth, -1))}
            >
              Prev
            </button>
            <div className="date-picker-title">Filter by date range</div>
            <button
              className="date-picker-nav"
              type="button"
              onClick={() => setVisibleMonth(addMonths(visibleMonth, 1))}
            >
              Next
            </button>
          </div>

          <div className="date-picker-inputs">
            <label>
              Start
              <input
                type="date"
                value={draftStart}
                min={availableRange && availableRange.min ? availableRange.min : undefined}
                max={availableRange && availableRange.max ? availableRange.max : undefined}
                onChange={(event) => setDraftStart(clampDate(event.target.value, availableRange))}
              />
            </label>
            <label>
              End
              <input
                type="date"
                value={draftEnd}
                min={availableRange && availableRange.min ? availableRange.min : undefined}
                max={availableRange && availableRange.max ? availableRange.max : undefined}
                onChange={(event) => setDraftEnd(clampDate(event.target.value, availableRange))}
              />
            </label>
          </div>

          <div className="calendar-grid-wrap">
            <CalendarMonth
              monthDate={visibleMonth}
              draftStart={draftStart}
              draftEnd={draftEnd}
              availableRange={availableRange}
              onSelectDate={selectDate}
            />
            <CalendarMonth
              monthDate={addMonths(visibleMonth, 1)}
              draftStart={draftStart}
              draftEnd={draftEnd}
              availableRange={availableRange}
              onSelectDate={selectDate}
            />
          </div>

          <div className="date-picker-actions">
            <div className="date-picker-action-group">
              <button className="date-picker-button" type="button" onClick={() => setPreset(7)}>
                Last 7d
              </button>
              <button className="date-picker-button" type="button" onClick={() => setPreset(30)}>
                Last 30d
              </button>
              <button className="date-picker-button" type="button" onClick={onClear}>
                All
              </button>
            </div>
            <div className="date-picker-action-group">
              <button className="date-picker-button" type="button" onClick={onClose}>
                Cancel
              </button>
              <button
                className="date-picker-button primary"
                type="button"
                disabled={!draftStart || !draftEnd}
                onClick={applyRange}
              >
                Apply
              </button>
            </div>
          </div>
        </div>
      );
    }

    function PrescribeApplySummary({ latest }) {
      const providers = [
        ['claude', 'Claude'],
        ['codex', 'Codex'],
      ];

      return (
        <div className="prescription-summary">
          {providers.map(([key, label]) => {
            const event = latest ? latest[key] : null;
            const details = event && event.details ? event.details : {};
            const metrics = Array.isArray(details.metrics) ? details.metrics : [];
            const written = Array.isArray(details.written) ? details.written : [];
            const status = details.status === 'no_prescriptions' ? 'No prescriptions needed' : 'Applied';

            return (
              <div className="prescription-card" key={key}>
                <div className="prescription-card-header">
                  <div className="prescription-provider">{label} latest prescribe --apply</div>
                  {event && <div className="prescription-change-id">change #{event.id}</div>}
                </div>
                <div className="prescription-time">{event ? formatDateTime(event.timestamp) : 'Never recorded'}</div>
                {event ? (
                  <div className="prescription-detail">
                    <div>
                      <strong>{status}</strong>
                      {typeof details.prescriptionCount === 'number'
                        ? ` · ${details.prescriptionCount} prescription(s)`
                        : ''}
                      {details.target ? ` · ${details.target}` : ''}
                    </div>
                    <div>
                      Metrics: {metrics.length > 0 ? metrics.join(', ') : 'none'}
                    </div>
                    <div>
                      Files touched: {written.length > 0 ? written.length : 0}
                    </div>
                  </div>
                ) : (
                  <div className="prescription-detail">
                    Run <strong>agent-vitals prescribe --source {key} --apply</strong> to create a tracked event.
                  </div>
                )}
              </div>
            );
          })}
        </div>
      );
    }

    function AlertsPopover({ alerts, onClose }) {
      return (
        <div className="alerts-popover" onClick={(event) => event.stopPropagation()}>
          <div className="alerts-popover-title">Alert details</div>
          {alerts.length === 0 ? (
            <div className="alert-detail-body">No active alerts.</div>
          ) : (
            alerts.map((alert, index) => {
              const models = Array.isArray(alert.models) && alert.models.length > 0
                ? alert.models
                : ['Aggregate (_all)'];
              return (
                <div className={`alert-detail ${alert.severity}`} key={`${alert.metric}-${index}`}>
                  <div className="alert-detail-header">
                    <div className="alert-detail-title">{metricLabel(alert.metric)}</div>
                    <div className={`alert-detail-severity ${alert.severity}`}>
                      {alert.severity}
                    </div>
                  </div>
                  <div className="alert-detail-body">
                    <div><strong>Model:</strong> {models.join(', ')}</div>
                    <div><strong>Current:</strong> {alert.current} · <strong>Previous:</strong> {alert.previous}</div>
                    <div><strong>Change:</strong> {alert.changePct}% · <strong>Threshold:</strong> {alert.threshold}</div>
                    <div>{alert.message}</div>
                  </div>
                </div>
              );
            })
          )}
          <div style={{ marginTop: 10, textAlign: 'right' }}>
            <button className="date-picker-button" type="button" onClick={onClose}>
              Close
            </button>
          </div>
        </div>
      );
    }

    // -----------------------------------------------------------------------
    // App
    // -----------------------------------------------------------------------

    function App() {
      const initialSource = (DEFAULT_SOURCE && DEFAULT_SOURCE !== '__AGENT_VITALS_DEFAULT_SOURCE__')
        ? DEFAULT_SOURCE
        : 'all';
      const [source, setSource] = React.useState(initialSource);
      const [metrics, setMetrics] = React.useState([]);
      const [changes, setChanges] = React.useState([]);
      const [health, setHealth] = React.useState(null);
      const [sessions, setSessions] = React.useState(null);
      const [prescribeApplies, setPrescribeApplies] = React.useState(null);
      const [loading, setLoading] = React.useState(true);
      const [error, setError] = React.useState(null);
      const [activeChange, setActiveChange] = React.useState(null);
      const [dateRange, setDateRange] = React.useState({ start: '', end: '' });
      const [availableRange, setAvailableRange] = React.useState(null);
      const [datePickerOpen, setDatePickerOpen] = React.useState(false);
      const [alertsOpen, setAlertsOpen] = React.useState(false);

      React.useEffect(() => {
        let cancelled = false;
        setLoading(true);
        setError(null);
        setActiveChange(null);
        setAlertsOpen(false);
        const params = new URLSearchParams({ source: source || 'all' });
        if (dateRange.start) params.set('start', dateRange.start);
        if (dateRange.end) params.set('end', dateRange.end);
        const qs = `?${params.toString()}`;
        Promise.all([
          fetch(`/api/metrics${qs}`).then(r => r.json()),
          fetch(`/api/changes${qs}`).then(r => r.json()),
          fetch(`/api/health${qs}`).then(r => r.json()),
          fetch(`/api/sessions${qs}`).then(r => r.json()),
          fetch('/api/prescriptions/latest').then(r => r.json()),
        ])
          .then(([m, c, h, s, p]) => {
            if (cancelled) return;
            setMetrics(m);
            setChanges(c);
            setHealth(h);
            setSessions(s);
            setPrescribeApplies(p);
            if (!dateRange.start && !dateRange.end && s.dateRange) {
              setAvailableRange(s.dateRange);
            } else if (!availableRange && s.dateRange) {
              setAvailableRange(s.dateRange);
            }
            setLoading(false);
          })
          .catch(err => {
            if (cancelled) return;
            setError(err.message);
            setLoading(false);
          });
        return () => { cancelled = true; };
      }, [source, dateRange.start, dateRange.end]);

      if (loading) {
        return (
          <div className="loading">
            <div className="loading-spinner" />
            <div style={{ color: COLORS.dimText }}>Loading dashboard...</div>
          </div>
        );
      }

      if (error) {
        return (
          <div className="loading">
            <div style={{ color: COLORS.red, fontSize: 16 }}>Error: {error}</div>
            <div style={{ color: COLORS.dimText, marginTop: 8 }}>
              Make sure the API server is running.
            </div>
          </div>
        );
      }

      const healthStatus = health ? health.status : 'green';
      const healthMsg = health ? health.message : '';
      const alerts = health ? (health.alerts || []) : [];

      const activeChangeDate = activeChange
        ? activeChange.timestamp.substring(0, 10)
        : null;
      const activeDateFilter = Boolean(dateRange.start || dateRange.end);
      const displayDateRange = {
        min: dateRange.start || (sessions && sessions.dateRange ? sessions.dateRange.min : null),
        max: dateRange.end || (sessions && sessions.dateRange ? sessions.dateRange.max : null),
      };

      return (
        <div>
          {/* Top Bar */}
          <div className="topbar">
            <div className="topbar-title">AGENT VITALS</div>
            <div className="topbar-controls">
              <select
                className="source-select"
                value={source}
                onChange={(e) => setSource(e.target.value)}
                aria-label="Source"
              >
                <option value="all">All Sources</option>
                <option value="claude">Claude</option>
                <option value="codex">Codex</option>
              </select>
              <div className={`health-badge ${healthStatus}`}>
                <div className={`health-dot ${healthStatus}`} />
                {healthStatus === 'green' ? 'Healthy' : healthStatus === 'yellow' ? 'Warning' : 'Critical'}
              </div>
            </div>
          </div>

          {/* Summary Stats */}
          <div className="summary-row">
            <div className="stat-card">
              <div className="stat-label">Sessions Scanned</div>
              <div className="stat-value">{sessions ? sessions.count.toLocaleString() : '--'}</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Tool Calls</div>
              <div className="stat-value">{sessions ? sessions.toolCalls.toLocaleString() : '--'}</div>
            </div>
            <div
              className={`stat-card interactive ${activeDateFilter ? 'active' : ''}`}
              onClick={() => setDatePickerOpen(true)}
            >
              <div className="stat-label">Date Range</div>
              <div className="stat-value" style={{ fontSize: 14 }}>
                {displayDateRange.min
                  ? `${formatDate(displayDateRange.min)} - ${formatDate(displayDateRange.max)}`
                  : '--'}
              </div>
              <div className="stat-hint">
                {activeDateFilter ? 'Filtered. Click to change.' : 'Click to filter.'}
              </div>
              {datePickerOpen && (
                <DateRangePicker
                  dateRange={dateRange}
                  availableRange={availableRange || (sessions ? sessions.dateRange : null)}
                  onApply={(next) => {
                    setDateRange(next);
                    setDatePickerOpen(false);
                  }}
                  onClear={() => {
                    setDateRange({ start: '', end: '' });
                    setDatePickerOpen(false);
                  }}
                  onClose={() => setDatePickerOpen(false)}
                />
              )}
            </div>
            <div
              className={`stat-card interactive ${alertsOpen ? 'active' : ''}`}
              onClick={() => setAlertsOpen(true)}
            >
              <div className="stat-label">Alerts</div>
              <div className="stat-value" style={{ color: alerts.length > 0 ? COLORS.red : COLORS.green }}>
                {alerts.length}
              </div>
              <div className="stat-hint">
                {alerts.length > 0 ? 'Click for details.' : 'No active alerts.'}
              </div>
              {alertsOpen && <AlertsPopover alerts={alerts} onClose={() => setAlertsOpen(false)} />}
            </div>
          </div>

          <PrescribeApplySummary latest={prescribeApplies} />

          {/* Change Timeline */}
          <ChangeTimeline
            changes={changes}
            metricsData={metrics}
            activeChangeId={activeChange ? activeChange.id : null}
            onSelectChange={setActiveChange}
          />

          {/* Active change info */}
          {activeChange && (
            <div style={{ padding: '0 24px 8px', display: 'flex', alignItems: 'center', gap: 8 }}>
              <div style={{
                background: 'rgba(255,204,0,0.1)',
                border: '1px solid rgba(255,204,0,0.3)',
                borderRadius: 6,
                padding: '6px 12px',
                fontSize: 11,
                color: COLORS.yellow,
                flex: 1,
              }}>
                Showing change overlay: <strong>[{activeChange.type}]</strong> {activeChange.description}
                <span
                  style={{ marginLeft: 12, cursor: 'pointer', opacity: 0.6 }}
                  onClick={() => setActiveChange(null)}
                >
                  [clear]
                </span>
              </div>
            </div>
          )}

          {/* Metric Sections */}
          {METRIC_SECTIONS.map(section => (
            <div key={section.title}>
              <div className="section-title">{section.title}</div>
              <div className="chart-grid">
                {section.metrics.map(metric => (
                  <MetricChart
                    key={metric.key}
                    metricDef={metric}
                    data={metrics}
                    activeChangeDate={activeChangeDate}
                  />
                ))}
              </div>
            </div>
          ))}

          {/* Footer */}
          <div style={{ textAlign: 'center', padding: '24px', color: COLORS.dimText, fontSize: 11 }}>
            Agent Vitals Dashboard &middot; Data refreshed on page load
          </div>
        </div>
      );
    }

    // -----------------------------------------------------------------------
    // Mount
    // -----------------------------------------------------------------------

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
